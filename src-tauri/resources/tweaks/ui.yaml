tweaks:
  - id: disable-widgets
    name: Remove Widgets from Taskbar
    category: ui
    risk: safe
    requiresReboot: false
    win11BuildMin: 22000
    description: Hides the Widgets button from the Windows 11 taskbar.
    warning: null
    detectScript: scripts/ui/disable-widgets-detect.ps1
    applyScript: scripts/ui/disable-widgets-apply.ps1
    revertScript: scripts/ui/disable-widgets-revert.ps1
