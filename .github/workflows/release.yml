name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build and publish Windows installer
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from package.json
        id: pkg
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          if ([string]::IsNullOrWhiteSpace($version)) {
            throw "package.json version is empty"
          }
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "tag=v$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "Release tag: v$version"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run tauri build

      - name: Stage release assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          Copy-Item src-tauri/target/release/bundle/nsis/*.exe release-assets/
          if (Test-Path src-tauri/target/release/bundle/msi) {
            Copy-Item src-tauri/target/release/bundle/msi/*.msi release-assets/ -ErrorAction SilentlyContinue
          }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.pkg.outputs.tag }}
          name: Debloater ${{ steps.pkg.outputs.version }}
          files: release-assets/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(steps.pkg.outputs.version, '-') }}
